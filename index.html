
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>월별급여현황 시스템 v16.8</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        body { 
            font-family: 'Pretendard', sans-serif; 
            background-color: #f8fafc; 
            color: #334155; 
            -webkit-text-size-adjust: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* 탭 및 서브콘텐츠 전환 */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .sub-content { display: none; }
        .sub-content.active { display: block; }
        
        /* 터치 반응 모바일 스크롤바 */
        .custom-scrollbar::-webkit-scrollbar { height: 4px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        
        /* 테이블 스타일 (모바일 친화적 조정) */
        .statement-table { width: 100%; border-collapse: collapse; border: 1.5px solid #cbd5e1; background-color: white; table-layout: fixed; }
        .statement-table td, .statement-table th { 
            border: 1px solid #e2e8f0; 
            padding: 10px 8px; 
            font-size: 11px; 
            height: 42px; 
            vertical-align: middle; 
            word-break: keep-all; 
            white-space: nowrap; 
        }
        
        .st-header { background-color: #1e293b; color: #ffffff; text-align: center; font-weight: 800; font-size: 13px; letter-spacing: 0.5px; }
        .st-section { background-color: #f1f5f9; font-weight: 800; text-align: center; color: #1e293b; letter-spacing: 0.5px; height: 12px; padding: 0 !important; }
        
        .st-label-main { background-color: #f8fafc; font-weight: 700; text-align: center; color: #475569; }
        .st-label-sub { background-color: #f8fafc; font-weight: 600; text-align: center; color: #64748b; }
        .st-label-leaf { background-color: #ffffff; font-weight: 500; text-align: left; padding-left: 10px; color: #475569; }
        
        .st-value { text-align: right; font-weight: 700; color: #0f172a; font-size: 12px; font-family: monospace; }
        .st-value-total { text-align: right; font-weight: 800; color: #2563eb; font-size: 12px; background-color: #eff6ff; }
        .st-value-minus { text-align: right; font-weight: 800; color: #dc2626; font-size: 12px; background-color: #fef2f2; }
        .st-value-mix { text-align: right; font-weight: 800; color: #0d9488; font-size: 12px; background-color: #f0fdfa; }

        /* 틀 고정을 지원하는 입력 테이블 디자인 */
        .excel-input-table { border-collapse: separate; border-spacing: 0; }
        .excel-input-table th { background-color: #f1f5f9; color: #475569; font-weight: 700; text-align: center; font-size: 11px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; white-space: nowrap; padding: 12px 6px; }
        .excel-input-table td { border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; padding: 6px; white-space: nowrap; height: 46px; vertical-align: middle; }
        .excel-input-table input { 
            width: 100%; 
            text-align: right; 
            font-weight: 700; 
            font-size: 13px; 
            padding: 8px 6px; 
            border: 1px solid #cbd5e1; 
            border-radius: 8px; 
            background-color: #fff;
            outline: none;
            transition: border-color 0.2s;
        }
        .excel-input-table input:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }
        
        /* 틀고정 Sticky 스타일 정의 */
        .sticky-col-1 {
            position: sticky !important;
            left: 0px !important;
            z-index: 20;
            background-color: #f8fafc !important; /* 견고한 배경 불투명도 */
            box-shadow: 2px 0 5px rgba(15, 23, 42, 0.08);
            border-right: 1px solid #cbd5e1 !important;
        }
        .sticky-col-2 {
            position: sticky !important;
            left: 60px !important; /* 구분 컬럼 너비 60px 뒤에 고정 */
            z-index: 20;
            background-color: #ffffff !important;
            box-shadow: 3px 0 6px rgba(15, 23, 42, 0.08);
            border-right: 2px solid #94a3b8 !important; /* 스크롤 경계선 강조 */
        }
        .sticky-col-2-calc {
            position: sticky !important;
            left: 60px !important;
            z-index: 20;
            background-color: #f1f5f9 !important; /* 소계 행에 어울리는 색상 */
            box-shadow: 3px 0 6px rgba(15, 23, 42, 0.08);
            border-right: 2px solid #94a3b8 !important;
        }

        /* 설정 테이블 모바일 크기 대응 */
        .rules-table th { background-color: #fffbeb; color: #b45309; padding: 10px; font-size: 11px; font-weight: 700; text-align: center; border: 1px solid #fde68a; }
        .rules-table td { padding: 6px; border: 1px solid #fde68a; white-space: nowrap; }
        .rules-table input { 
            width: 100%; 
            text-align: right; 
            font-weight: 700; 
            font-size: 13px; 
            padding: 8px; 
            border: 1px solid #fde68a; 
            border-radius: 8px; 
            background-color: #fff; 
            outline: none;
        }
        .rules-table input:focus { border-color: #f59e0b; }

        /* 모바일 하단 Bottom Sheet 모달 효과 */
        .bottom-sheet {
            transition: transform 0.3s ease-out;
            transform: translateY(100%);
        }
        .bottom-sheet.show {
            transform: translateY(0);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col pb-24 select-none">

    <!-- 상단 헤더 -->
    <header class="bg-white text-slate-800 sticky top-0 z-40 shadow-sm border-b border-slate-100 backdrop-blur-md bg-white/95">
        <div class="max-w-7xl mx-auto px-4 py-3.5 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="bg-blue-500 p-2 rounded-xl text-white shadow-sm shadow-blue-500/20">
                    <i class="fa-solid fa-calculator text-xs"></i>
                </div>
                <div>
                    <p class="text-sm font-extrabold text-slate-800 tracking-tight">월별급여현황</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <span class="text-[10px] font-black text-slate-400 shrink-0 whitespace-nowrap">급여지급년월</span>
                <select id="global-month-select" onchange="onMonthChanged()" class="bg-slate-100 hover:bg-slate-200 active:scale-95 transition-all px-3 py-2 rounded-xl text-xs font-black text-slate-700 border-0 outline-none">
                </select>
            </div>
        </div>
    </header>

    <!-- 메인 본문 콘텐츠 영역 -->
    <main class="flex-1 max-w-7xl w-full mx-auto p-4 space-y-4">
        
        <!-- 탭 1: 홈/대시보드 -->
        <div id="tab-dashboard" class="tab-content active space-y-4">
            <!-- 월평균 급여 카드 -->
            <div class="bg-gradient-to-tr from-slate-900 to-slate-800 p-5 rounded-2xl shadow-lg shadow-slate-950/10 text-white space-y-3 relative overflow-hidden">
                <div class="absolute -right-6 -bottom-6 text-slate-700/20 text-7xl"><i class="fa-solid fa-coins"></i></div>
                <div class="flex border-b border-slate-700/60 pb-2 gap-4 text-xs font-bold text-slate-400" id="year-avg-tab-headers"></div>
                <div class="pt-1 z-10 relative">
                    <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">선택 연도 월평균 급여 (실적 기입 완료 기준)</p>
                    <p class="text-2xl font-black mt-1.5 text-blue-400" id="dash-year-avg-value">0 원</p>
                </div>
            </div>

            <!-- 급여 현황 목록 -->
            <div class="bg-white p-4 rounded-2xl border border-slate-100 shadow-sm space-y-3">
                <div class="flex justify-between items-center border-b border-slate-50 pb-2">
                    <h3 class="text-xs font-black text-slate-700 flex items-center gap-1.5">
                        <i class="fa-solid fa-table-list text-blue-500"></i> 마감 월별 현황
                    </h3>
                    <span class="text-[10px] text-slate-400 font-medium">드래그하여 가로보기 가능</span>
                </div>
                <div class="overflow-x-auto custom-scrollbar -mx-4 px-4">
                    <table class="w-full text-xs text-left border-collapse min-w-[500px]">
                        <thead>
                            <tr class="bg-slate-50/50 text-slate-400 font-bold border-b border-slate-100">
                                <th class="p-3">급여지급월</th>
                                <th class="p-3">이름</th>
                                <th class="p-3 text-right">실제급여</th>
                                <th class="p-3 text-right">예상급여</th>
                                <th class="p-3 text-right">차액</th>
                            </tr>
                        </thead>
                        <tbody id="dashboard-history-tbody" class="font-medium text-slate-600 divide-y divide-slate-50"></tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- 탭 2: 상담원 관리 -->
        <div id="tab-agents" class="tab-content space-y-3">
            <div class="flex justify-between items-center px-1">
                <h2 class="text-sm font-black text-slate-800">👥 상담원 현황</h2>
                <button onclick="openAgentModal()" class="text-xs bg-blue-600 text-white font-bold px-3.5 py-2.5 rounded-xl shadow-md shadow-blue-500/10 active:scale-95 transition-all">+ 상담원 등록</button>
            </div>
            <!-- 카드 리스트 구조로 모바일 편의성 극대화 -->
            <div class="grid grid-cols-1 gap-3" id="agent-list-container"></div>
        </div>

        <!-- 탭 3: 입력값 설정 -->
        <div id="tab-inputs" class="tab-content space-y-4">
            <!-- 예상/실제 토글 및 대상자 선택 -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-3">
                <div class="flex p-1 bg-slate-200/60 rounded-xl relative">
                    <button onclick="toggleDataType('estimated')" id="btn-data-est" class="flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 bg-slate-900 text-white shadow-sm font-extrabold">🔮 예상 데이터 입력</button>
                    <button onclick="toggleDataType('actual')" id="btn-data-act" class="flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 text-slate-500 hover:text-slate-800 font-semibold">💵 실제 데이터 입력</button>
                </div>
                <div class="flex items-center justify-between gap-3 bg-slate-50 p-2 rounded-xl">
                    <span class="text-xs font-bold text-slate-500 shrink-0 pl-1">상담원 선택</span>
                    <select id="input-agent-select" class="flex-1 border-0 bg-transparent text-xs font-extrabold outline-none text-slate-800 py-1.5" onchange="onInputAgentChanged()"></select>
                </div>
            </div>

            <!-- 서브 서브 메뉴 탭 -->
            <div class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                <div class="flex border-b bg-slate-50/50 overflow-x-auto custom-scrollbar whitespace-nowrap">
                    <button onclick="switchInputSubTab('perf')" id="subtab-perf" class="flex-1 text-center py-3.5 text-xs font-black border-b-2 border-blue-600 text-blue-600">📋 실적 입력</button>
                    <button onclick="switchInputSubTab('base')" id="subtab-base" class="flex-1 text-center py-3.5 text-xs font-black border-b-2 border-transparent text-slate-400">🏢 고정수당</button>
                    <button onclick="switchInputSubTab('renew')" id="subtab-renew" class="flex-1 text-center py-3.5 text-xs font-black border-b-2 border-transparent text-slate-400">🔄 효율/공제</button>
                </div>

                <div class="p-4">
                    <!-- 서브 탭 1: 실적 입력 그리드 (틀 고정이 추가됨) -->
                    <div id="input-section-perf" class="sub-content active overflow-x-auto custom-scrollbar -mx-4 px-4">
                        <table class="w-full text-xs excel-input-table min-w-[650px]">
                            <colgroup>
                                <col width="60"><col width="110"><col width="95"><col width="95"><col width="95"><col width="95"><col width="95">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th rowspan="2" class="border-b sticky-col-1">구분</th>
                                    <th rowspan="2" class="border-b sticky-col-2-calc">상세 항목</th>
                                    <th colspan="4" class="border-b bg-blue-50/40 text-blue-800 font-extrabold">(일반)</th>
                                    <th class="border-b bg-emerald-50/40 text-emerald-800 font-extrabold">(공동)</th>
                                </tr>
                                <tr>
                                    <th>비불량</th>
                                    <th>50%</th>
                                    <th>평균</th>
                                    <th>불량</th>
                                    <th>전체</th>
                                </tr>
                            </thead>
                            <tbody id="input-grid-body"></tbody>
                        </table>
                    </div>

                    <!-- 서브 탭 2: 고정 수당 입력 -->
                    <div id="input-section-base" class="sub-content space-y-4">
                        <div class="grid grid-cols-2 gap-3 text-xs">
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-500">기본급</label>
                                <input type="text" id="in-base-pay" class="w-full border border-slate-200 p-3 rounded-xl text-right font-bold bg-slate-50" oninput="formatCommaInput(this)">
                            </div>
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-500">직무수당</label>
                                <input type="text" id="in-duty-pay" class="w-full border border-slate-200 p-3 rounded-xl text-right font-bold bg-slate-50" oninput="formatCommaInput(this)">
                            </div>
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-500">파트리더 수당</label>
                                <input type="text" id="in-leader-pay" class="w-full border border-slate-200 p-3 rounded-xl text-right font-bold bg-slate-50" oninput="formatCommaInput(this)">
                            </div>
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-500">보전수당</label>
                                <input type="text" id="in-protection-pay" class="w-full border border-slate-200 p-3 rounded-xl text-right font-bold bg-slate-50" oninput="formatCommaInput(this)">
                            </div>
                        </div>
                    </div>

                    <!-- 서브 탭 3: 효율 및 공제 수당 -->
                    <div id="input-section-renew" class="sub-content space-y-4">
                        <div class="grid grid-cols-2 gap-3 text-xs">
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-500">체결율 (%)</label>
                                <input type="number" id="in-close-rate" class="w-full border border-slate-200 p-3 rounded-xl text-right font-bold bg-slate-50" step="0.01">
                            </div>
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-500">갱신율 (%)</label>
                                <input type="number" id="in-renew-rate" class="w-full border border-slate-200 p-3 rounded-xl text-right font-bold bg-slate-50" step="0.01">
                            </div>
                            <div class="space-y-1.5">
                                <label class="font-bold text-slate-500">공동지급율 (%)</label>
                                <input type="number" id="in-joint-rate" class="w-full border border-slate-200 p-3 rounded-xl text-right font-bold bg-slate-50" step="0.01">
                            </div>
                            <div class="space-y-1.5">
                                <label class="font-bold text-rose-500">불완전판매공제 (원)</label>
                                <input type="text" id="in-deduct-amount" class="w-full border-rose-200 border p-3 rounded-xl text-right font-bold bg-rose-50/30 text-rose-600" oninput="formatCommaInput(this)">
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- 하단 동작바 -->
                <div class="bg-slate-50 p-4 border-t border-slate-100 flex justify-end">
                    <button onclick="saveCurrentAgentData()" class="w-full sm:w-auto bg-blue-600 text-white font-extrabold text-xs py-3 px-6 rounded-xl shadow-md shadow-blue-500/15 active:scale-95 transition-all">지표 저장 및 실시간 재계산</button>
                </div>
            </div>
        </div>

        <!-- 탭 4: 기준값 설정 -->
        <div id="tab-rules" class="tab-content space-y-4">
            <div class="bg-white p-4 rounded-2xl border shadow-sm flex items-center justify-between">
                <span class="text-xs font-black text-slate-500">영업속성별 기준값 설정</span>
                <select id="rule-attr-select" class="text-xs font-bold text-slate-700 bg-slate-100 px-3 py-2.5 rounded-xl outline-none border-0" onchange="renderRules()"></select>
            </div>
            <div class="space-y-4" id="rules-container-box"></div>
        </div>

        <!-- 탭 5: 예상 VS 실제 결과 비교 급여 상세 -->
        <div id="tab-expected" class="tab-content space-y-4">
            <div class="flex flex-col gap-3 bg-white p-4 rounded-2xl shadow-sm border border-slate-100">
                <div class="flex p-1 bg-slate-200/60 rounded-xl relative">
                    <button onclick="switchSheetSubTab('est_sheet')" id="btn-sheet-est" class="flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 bg-slate-900 text-white shadow-sm font-extrabold">🔮 예상급여</button>
                    <button onclick="switchSheetSubTab('act_sheet')" id="btn-sheet-act" class="flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 text-slate-500 hover:text-slate-800 font-semibold">💵 실제급여</button>
                </div>
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-xl">
                    <span class="text-xs font-bold text-slate-500 pl-1">급여 대상</span>
                    <select id="expected-agent-select" class="flex-1 border-0 bg-transparent text-xs font-extrabold outline-none text-slate-800 py-1.5" onchange="onExpectedAgentChanged()"></select>
                </div>
            </div>
            <!-- 급여 테이블 뷰 -->
            <div class="bg-white p-3 rounded-2xl border border-slate-200 shadow-sm overflow-x-auto custom-scrollbar" id="sheet-container"></div>
        </div>

    </main>

    <!-- 모바일 한 손 인터랙션용 하단 플로팅 네비게이션 바 -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-slate-100 flex justify-around p-2 z-40 shadow-xl pb-safe">
        <button onclick="switchTab('dashboard')" class="nav-btn flex-1 flex flex-col items-center py-2 text-blue-600 font-extrabold transition-all"><i class="fa-solid fa-house text-base"></i><span class="text-[9px] mt-1 tracking-tight">홈</span></button>
        <button onclick="switchTab('agents')" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-400 font-extrabold transition-all"><i class="fa-solid fa-users text-base"></i><span class="text-[9px] mt-1 tracking-tight">상담원</span></button>
        <button onclick="switchTab('inputs')" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-400 font-extrabold transition-all"><i class="fa-solid fa-keyboard text-base"></i><span class="text-[9px] mt-1 tracking-tight">입력값</span></button>
        <button onclick="switchTab('rules')" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-400 font-extrabold transition-all"><i class="fa-solid fa-sliders text-base"></i><span class="text-[9px] mt-1 tracking-tight">기준값</span></button>
        <button onclick="switchTab('expected')" class="nav-btn flex-1 flex flex-col items-center py-2 text-slate-400 font-extrabold transition-all"><i class="fa-solid fa-file-invoice text-base"></i><span class="text-[9px] mt-1 tracking-tight">예상vs실제</span></button>
    </nav>

    <!-- 모바일 Bottom-Sheet 형태의 상담원 정보 설정 모달 -->
    <div id="agent-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs hidden z-50 flex items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="absolute inset-0" onclick="closeAgentModal()"></div>
        <div class="bg-white rounded-t-3xl sm:rounded-3xl max-w-md w-full p-6 space-y-4 shadow-2xl border border-slate-50 z-10 bottom-sheet" id="modal-container">
            <div class="w-12 h-1.5 bg-slate-200 rounded-full mx-auto -mt-2 mb-2 sm:hidden"></div>
            <div class="flex justify-between items-center border-b pb-3">
                <h3 class="font-extrabold text-base text-slate-800">📋 상담원 정보 설정</h3>
                <button onclick="closeAgentModal()" class="text-slate-400 text-base"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <input type="hidden" id="edit-agent-id">
            <div class="space-y-4 text-xs font-bold max-h-[60vh] overflow-y-auto custom-scrollbar pr-1">
                <div class="space-y-1.5"><label class="text-slate-500">상담원명</label><input type="text" id="m-name" class="w-full border rounded-xl p-3 bg-slate-50 text-slate-800 text-sm outline-none font-bold"></div>
                <div class="space-y-1.5">

        </div>
    </div>

    <!-- iframe 보안 규정 우회를 위한 커스텀 삭제 확인 모달 -->
    <div id="delete-confirm-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-xs hidden z-50 flex items-center justify-center p-4">

    <script>
        let selectedYearTab = "2026"; 
        let monthlyData = {}; 

        // 비즈니스 룰 및 매핑 데이터 구조 (기본값)
        let defaultRules = {
            'WSR': {
                total_perf: [
                    {t: -30000000, r: 2.00}, {t: 39999999, r: 2.00}, {t: 40000000, r: 3.00}, {t: 50000000, r: 3.60}, 
                    {t: 60000000, r: 4.00}, {t: 70000000, r: 4.30}, {t: 80000000, r: 4.50}, {t: 90000000, r: 4.80}, {t: 100000000, r: 5.00} 
                ], 
                closing_rate_rule: [
                    {t: 0.0, r: 0.00}, {t: 13.0, r: 3.00}, {t: 15.0, r: 4.00}, {t: 18.0, r: 5.00}
                ],
                career: [
                    {t: -10000000, y1: 0, y2: 0, y3: 0, y5: 0},            
                    {t: 38000000, y1: 100000, y2: 100000, y3: 100000, y5: 0},       
                    {t: 43000000, y1: 120000, y2: 120000, y3: 120000, y5: 120000},  
                    {t: 47000000, y1: 150000, y2: 150000, y3: 150000, y5: 150000},  
                    {t: 60000000, y1: 150000, y2: 200000, y3: 200000, y5: 200000},  
                    {t: 67000000, y1: 150000, y2: 200000, y3: 300000, y5: 300000},  
                    {t: 74000000, y1: 150000, y2: 200000, y3: 300000, y5: 400000}

            'OSR혼합': {

                perf_new: [

                    {t: 20000000, r: 8.90}, {t: 23000000, r: 9.10}, {t: 25000000, r: 9.30}, {t: 28000000, r: 9.50},
                    {t: 30000000, r: 9.65}, {t: 33000000, r: 9.80}, {t: 35000000, r: 9.90}, {t: 40000000, r: 10.00}
                ],
                perf_renew: [
                    {t: 0, r: 0.10}, {t: 50000000, r: 0.80}, {t: 60000000, r: 1.30}, {t: 70000000, r: 1.65},
                    {t: 80000000, r: 1.90}, {t: 90000000, r: 2.25}, {t: 100000000, r: 2.60}, {t: 110000000, r: 2.80},
                    {t: 120000000, r: 2.85}, {t: 130000000, r: 2.90}, {t: 140000000, r: 2.95}, {t: 150000000, r: 3.00}
                ],
                career: [
                    {t: 0, y1: 0, y2: 0, y3: 0, y5: 0},
                    {t: 49000000, y1: 100000, y2: 100000, y3: 100000, y5: 0},
                    {t: 59000000, y1: 120000, y2: 120000, y3: 120000, y5: 120000},
                    {t: 67000000, y1: 150000, y2: 150000, y3: 150000, y5: 150000},
                    {t: 73000000, y1: 150000, y2: 200000, y3: 200000, y5: 200000},
                    {t: 86000000, y1: 150000, y2: 200000, y3: 300000, y5: 300000},
                    {t: 100000000, y1: 150000, y2: 200000, y3: 300000, y5: 400000}
                ]
            }
        };
        
        let rules = JSON.parse(JSON.stringify(defaultRules));

        const inputSchema = [
            { key: 'new_main', type: '신규', label: '신규' },
            { key: 'ren_wsr', type: '갱신', label: 'WSR갱신' },
            { key: 'ren_new', type: '갱신', label: '신규전담갱신' },
            { key: 'ren_ret', type: '갱신', label: '퇴사자갱신' },
            { key: 'ren_oth', type: '갱신', label: '기타타인갱신' },
            { key: 'ren_self', type: '갱신', label: '본인갱신' },
            { key: 'ren_trans', type: '갱신', label: '타점이관갱신' },
            { key: 'ren_cm', type: '갱신', label: 'CM갱신' },
            { key: 'ren_sub', type: '갱신', label: '소계', isCalc: true }
        ];

        let currentDataType = 'estimated'; 
        let currentInputAgentId = null;
        let currentExpectedAgentId = null;
        let currentSheetDataType = 'est_sheet';
        let pendingDeleteId = null; // 삭제 대기 대상 ID

        // 로컬 스토리지에 데이터를 백업하는 모듈식 세이브 함수
        function saveToLocalStorage() {
            try {
                localStorage.setItem('payroll_monthlyData_v16', JSON.stringify(monthlyData));
                localStorage.setItem('payroll_rules_v16', JSON.stringify(rules));
            } catch (e) {
                console.error("로컬 스토리지 데이터 백업 중 오류 발생: ", e);
            }
        }

        // 로컬 스토리지에서 데이터를 읽어와 복구하는 로드 함수
        function loadFromLocalStorage() {
            try {
                const savedData = localStorage.getItem('payroll_monthlyData_v16');
                const savedRules = localStorage.getItem('payroll_rules_v16');
                
                if (savedData) {
                    monthlyData = JSON.parse(savedData);
                } else {
                    // 기기 백업 기록이 전혀 없는 초기 상태일 때만 빈 지급월 구조들을 생성함
                    generateEmptyDefaultMonths();
                }
                
                if (savedRules) {
                    rules = JSON.parse(savedRules);
                } else {
                    rules = JSON.parse(JSON.stringify(defaultRules));
                }
            } catch (e) {
                console.error("로컬 스토리지 복구 실패, 기본값으로 로드합니다.", e);
                generateEmptyDefaultMonths();
                rules = JSON.parse(JSON.stringify(defaultRules));
            }
        }

        window.onload = function() {
            // 콤보박스에 뿌릴 기본 년월 풀을 먼저 동적 드롭다운화
            generateDynamicMonthDropdownOnly();
            
            // 로컬 스토리지에서 이전 정산 기록 전부 불러와 복구하기
            loadFromLocalStorage();
            
            // 등록된 실적 인풋 구조 동적 매핑
            initializeGridDataStructures(); 
            
            // 기준값 설정 탭 콤보박스 기본 매핑
            document.getElementById('rule-attr-select').innerHTML = Object.keys(rules).map(k => `<option value="${k}">${k}</option>`).join('');
            
            renderAll();
        };

        // 지급월 셀렉트 드롭다운 옵션 태그만 초기화 생성하는 유틸
        function generateDynamicMonthDropdownOnly() {
            const selectEl = document.getElementById('global-month-select');
            const now = new Date();
            let htmlOptions = "";
            
            let startYr = 2026;
            let startMn = 1; 

            let endPeriod = new Date(now.getFullYear(), now.getMonth() + 12, 1);
            let endYr = endPeriod.getFullYear();
            let endMn = endPeriod.getMonth() + 1;

            let checkDate = new Date(startYr, startMn - 1, 1);
            let endDate = new Date(endYr, endMn - 1, 1);

            while (checkDate <= endDate) {
                let yyyy = checkDate.getFullYear();
                let mm = String(checkDate.getMonth() + 1).padStart(2, '0');
                let valStr = `${yyyy}-${mm}`;
                
                let isSelected = (yyyy === now.getFullYear() && (checkDate.getMonth() + 1) === (now.getMonth() + 1)) ? "selected" : "";
                htmlOptions += `<option value="${valStr}" ${isSelected}>${yyyy}년 ${mm}월</option>`;
                
                checkDate.setMonth(checkDate.getMonth() + 1);
            }
            selectEl.innerHTML = htmlOptions;
            selectedYearTab = String(now.getFullYear() < 2026 ? 2026 : now.getFullYear());
        }

        // 백업 데이터가 없을 때만 호출되어 지급월 데이터 구조 템플릿을 생성
        function generateEmptyDefaultMonths() {
            const now = new Date();
            let startYr = 2026;
            let startMn = 1; 

            let endPeriod = new Date(now.getFullYear(), now.getMonth() + 12, 1);
            let endYr = endPeriod.getFullYear();
            let endMn = endPeriod.getMonth() + 1;

            let checkDate = new Date(startYr, startMn - 1, 1);
            let endDate = new Date(endYr, endMn - 1, 1);

            while (checkDate <= endDate) {
                let yyyy = checkDate.getFullYear();
                let mm = String(checkDate.getMonth() + 1).padStart(2, '0');
                let valStr = `${yyyy}-${mm}`;
                
                // 디폴트 상담원 홍길동/김철수를 완전히 제거한 빈 배열
                monthlyData[valStr] = [];
                
                checkDate.setMonth(checkDate.getMonth() + 1);
            }
        }

        function getSelectedMonth() { return document.getElementById('global-month-select').value; }
        
        function getAgentsOfSelectedMonth() {
            let m = getSelectedMonth();
            if(!m) return [];
            if(!monthlyData[m]) monthlyData[m] = [];
            return monthlyData[m];
        }

        function onMonthChanged() { 
            let m = getSelectedMonth();
            if(!m) return;
            selectedYearTab = m.split('-')[0];
            renderAll(); 
        }

        function fnFormat(num) {
            if (num < 0) return "▲ " + Math.abs(Math.round(num)).toLocaleString('ko-KR');
            return Math.round(num).toLocaleString('ko-KR');
        }
        function fnPct(num) { return Number(num).toFixed(2) + '%'; }
        function fnPct2(num) { return Number(num).toFixed(2) + '%'; }
        
        function toCommaStr(val) {
            if (val === undefined || val === null || isNaN(val)) return "0";
            let num = Number(val);
            let sign = num < 0 ? "-" : "";
            return sign + Math.abs(num).toLocaleString('ko-KR');
        }

        function formatCommaInput(el) {
            let cursor = el.selectionStart;
            let oldLen = el.value.length;
            let isMinus = el.value.startsWith('-');
            let cleanVal = el.value.replace(/[^0-9]/g, "");
            
            if (cleanVal === "") { 
                el.value = isMinus ? "-" : ""; 
                return; 
            }
            
            let numStr = Number(cleanVal).toLocaleString('ko-KR');
            el.value = isMinus ? "-" + numStr : numStr;
            
            let newLen = el.value.length;
            cursor = cursor + (newLen - oldLen);
            el.setSelectionRange(cursor, cursor);
        }

        function getRawNum(val) {
            if (typeof val === 'number') return val;
            if (!val) return 0;
            let str = String(val).replace(/,/g, "").trim();
            return Number(str) || 0;
        }

        function initializeGridDataStructures() {
            Object.keys(monthlyData).forEach(m => {
                monthlyData[m].forEach(a => {
                    ['estimated', 'actual'].forEach(tab => {
                        if (!a[tab].grid) a[tab].grid = {};
                        inputSchema.forEach(s => {
                            if(!a[tab].grid[s.key]) {
                                a[tab].grid[s.key] = { non: 0, p50: 0, avg: 0, bad: 0, joint: 0 };
                            }
                        });
                    });
                });
            });
        }

        function hasAnyPerformanceData(monthStr) {
            if (!monthlyData[monthStr]) return false;
            for (let agent of monthlyData[monthStr]) {
                for (let type of ['estimated', 'actual']) {
                    let g = agent[type].grid;
                    if (!g) continue;
                    for (let key in g) {
                        let row = g[key];
                        if (getRawNum(row.non) >= 1 || getRawNum(row.p50) >= 1 || 
                            getRawNum(row.avg) >= 1 || getRawNum(row.bad) >= 1 || 
                            getRawNum(row.joint) >= 1) {
                            return true; 
                        }
                    }
                }
            }
            return false;
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById('tab-' + tabId).classList.add('active');
            
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.classList.remove('text-blue-600');
                btn.classList.add('text-slate-400');
            });
            event.currentTarget.classList.remove('text-slate-400');
            event.currentTarget.classList.add('text-blue-600');
            
            renderAll();
        }

        function toggleDataType(type) {
            currentDataType = type;
            const btnEst = document.getElementById('btn-data-est');
            const btnAct = document.getElementById('btn-data-act');
            if(type === 'estimated') {
                btnEst.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 bg-slate-900 text-white shadow-sm font-extrabold";
                btnAct.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 text-slate-500 hover:text-slate-800 font-semibold";
            } else {
                btnEst.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 text-slate-500 hover:text-slate-800 font-semibold";
                btnAct.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 bg-slate-900 text-white shadow-sm font-extrabold";
            }
            renderInputSections();
        }

        function switchSheetSubTab(id) {
            currentSheetDataType = id;
            const btnEst = document.getElementById('btn-sheet-est');
            const btnAct = document.getElementById('btn-sheet-act');
            if(id === 'est_sheet') {
                btnEst.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 bg-slate-900 text-white shadow-sm font-extrabold";
                btnAct.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 text-slate-500 hover:text-slate-800 font-semibold";
            } else {
                btnEst.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 text-slate-500 hover:text-slate-800 font-semibold";
                btnAct.className = "flex-1 py-2.5 rounded-lg text-xs font-black transition-all duration-200 bg-slate-900 text-white shadow-sm font-extrabold";
            }
            renderExpectedSheet();
        }

        function switchInputSubTab(id) {
            document.querySelectorAll('.sub-content').forEach(c => c.classList.remove('active'));
            document.getElementById('input-section-' + id).classList.add('active');
            document.querySelectorAll('[id^="subtab-"]').forEach(b => {
                b.classList.remove('border-blue-600', 'text-blue-600');
                b.classList.add('border-transparent', 'text-slate-400');
            });
            document.getElementById('subtab-' + id).classList.remove('border-transparent', 'text-slate-400');
            document.getElementById('subtab-' + id).classList.add('border-blue-600', 'text-blue-600');
        }

        function onInputAgentChanged() {
            currentInputAgentId = document.getElementById('input-agent-select').value;
            renderInputSections();
        }

        function onExpectedAgentChanged() {
            currentExpectedAgentId = document.getElementById('expected-agent-select').value;
            renderExpectedSheet();
        }

        function renderAll() {
            let list = getAgentsOfSelectedMonth();
            
            if (list.length > 0) {
                if (!currentInputAgentId || !list.some(a => a.id == currentInputAgentId)) currentInputAgentId = list[0].id;
                if (!currentExpectedAgentId || !list.some(a => a.id == currentExpectedAgentId)) currentExpectedAgentId = list[0].id;
            } else {
                currentInputAgentId = null;
                currentExpectedAgentId = null;
            }

            renderAgentCards();
            
            const inputOptions = list.map(a => `<option value="${a.id}" ${a.id == currentInputAgentId ? 'selected' : ''}>${a.name} (${a.attribute})</option>`).join('');
            document.getElementById('input-agent-select').innerHTML = inputOptions || `<option value="">등록된 상담원 없음</option>`;
            
            const expectedOptions = list.map(a => `<option value="${a.id}" ${a.id == currentExpectedAgentId ? 'selected' : ''}>${a.name} (${a.attribute})</option>`).join('');
            document.getElementById('expected-agent-select').innerHTML = expectedOptions || `<option value="">등록된 상담원 없음</option>`;
            
            renderYearTabs();
            renderInputSections();
            renderRules();
            renderExpectedSheet();
            renderDashboardHistoryTable();
        }

        function renderYearTabs() {
            let years = new Set();
            Object.keys(monthlyData).forEach(m => years.add(m.split('-')[0]));
            let sortedYears = Array.from(years).sort();
            
            if(sortedYears.length === 0) sortedYears = ["2026"];
            if(!sortedYears.includes(selectedYearTab)) selectedYearTab = sortedYears[0];

            let html = sortedYears.map(y => `
                <button onclick="changeYearTab('${y}')" class="pb-1 transition-all ${selectedYearTab === y ? 'text-blue-400 border-b-2 border-blue-400 font-extrabold' : 'text-slate-500 font-medium'}">
                    ${y}년도
                </button>
            `).join('');
            document.getElementById('year-avg-tab-headers').innerHTML = html;

            let totalActualSum = 0;
            let monthCount = 0;
            Object.keys(monthlyData).forEach(m => {
                if(m.startsWith(selectedYearTab) && monthlyData[m].length > 0 && hasAnyPerformanceData(m)) {
                    let monthSum = monthlyData[m].reduce((acc, cur) => acc + calculateLogic(cur, 'actual').total, 0);
                    if(monthSum > 0) {
                        totalActualSum += monthSum;
                        monthCount++;
                    }
                }
            });
            let avgValue = monthCount > 0 ? Math.round(totalActualSum / monthCount) : 0;
            document.getElementById('dash-year-avg-value').innerText = avgValue.toLocaleString() + " 원";
        }

        function changeYearTab(year) {
            selectedYearTab = year;
            renderYearTabs();
        }

        function renderDashboardHistoryTable() {
            let html = "";
            let sortedMonths = Object.keys(monthlyData).sort((a,b) => b.localeCompare(a));
            
            sortedMonths.forEach(m => {
                if (!hasAnyPerformanceData(m)) return; 
                
                monthlyData[m].forEach(a => {
                    let resEst = calculateLogic(a, 'estimated');
                    let resAct = calculateLogic(a, 'actual');
                    let diff = resAct.total - resEst.total;
                    let parts = m.split('-');
                    html += `
                        <tr class="hover:bg-slate-50/70 transition-all">
                            <td class="p-3 font-bold text-slate-700">${parts[0].substring(2)}년 ${parts[1]}월</td>
                            <td class="p-3 font-extrabold text-blue-600">${a.name}</td>
                            <td class="p-3 text-right font-bold text-slate-800">${resAct.total.toLocaleString()}원</td>
                            <td class="p-3 text-right text-slate-400">${resEst.total.toLocaleString()}원</td>
                            <td class="p-3 text-right font-black ${diff >= 0 ? 'text-emerald-500' : 'text-rose-500'}">${diff >= 0 ? '+' : ''}${diff.toLocaleString()}</td>
                        </tr>
                    `;
                });
            });
            document.getElementById('dashboard-history-tbody').innerHTML = html || `<tr><td colspan="5" class="p-8 text-center text-slate-400 font-bold"><i class="fa-solid fa-folder-open text-xl mb-2 block"></i>정산 실적이 기입된 달이 없습니다.<br><span class="text-xs font-normal text-slate-300">하단 '입력값' 탭에서 실적을 입력해 주세요.</span></td></tr>`;
        }

        function renderAgentCards() {
            let list = getAgentsOfSelectedMonth();
            if (list.length === 0) {
                document.getElementById('agent-list-container').innerHTML = `
                    <div class="bg-white p-12 rounded-2xl border border-dashed border-slate-200 text-center text-slate-400 font-semibold space-y-2">

        function propagateToNextMonth(currentAgent) {
            let curMonth = getSelectedMonth();
            if(!curMonth) return;
            let parts = curMonth.split('-');

            if(nextMn > 12) { nextMn = 1; nextYr += 1; }
            let nextMonthStr = `${nextYr}-${String(nextMn).padStart(2, '0')}`;

            if(monthlyData[nextMonthStr]) {
                let nextList = monthlyData[nextMonthStr];
                let existingNextAgent = nextList.find(x => x.id == currentAgent.id);
                if(!existingNextAgent) {
                    let cloned = JSON.parse(JSON.stringify(currentAgent));
                    nextList.push(cloned);
                } else {
                    existingNextAgent.name = currentAgent.name;
                    existingNextAgent.attribute = currentAgent.attribute;
                    existingNextAgent.isTransfer = currentAgent.isTransfer;
                    existingNextAgent.entryDate = currentAgent.entryDate;
                    existingNextAgent.center = currentAgent.center;
                    existingNextAgent.room = currentAgent.room;
                }
            }
        }

        function calculateLogic(agent, tab) {
            const d = agent[tab]; const g = d.grid;
            if(!g || !g.new_main) return { total: 0, dateStr: '', career_pay: 0, pay_joint: 0, sum_new_renew_pay: 0 };
            
            const n_non = getRawNum(g.new_main.non); const n_p50 = getRawNum(g.new_main.p50); const n_avg = getRawNum(g.new_main.avg); const n_bad = getRawNum(g.new_main.bad);
            const new_subtotal = n_non + (n_p50 * 0.5) + (n_avg * 0.3);

            const ren_self_non = getRawNum(g.ren_self.non); const ren_wsr_non = getRawNum(g.ren_wsr.non);
            const ren_etc_non = getRawNum(g.ren_new.non) + getRawNum(g.ren_ret.non) + getRawNum(g.ren_oth.non) + getRawNum(g.ren_trans.non) + getRawNum(g.ren_cm.non);
            
            const ren_self_bad = getRawNum(g.ren_self.bad); const ren_wsr_bad = getRawNum(g.ren_wsr.bad);
            const ren_etc_bad = getRawNum(g.ren_new.bad) + getRawNum(g.ren_ret.bad) + getRawNum(g.ren_oth.bad) + getRawNum(g.ren_trans.bad) + getRawNum(g.ren_cm.bad);

            const wsr_ren_non_subtotal = ren_self_non + ren_wsr_non + ren_etc_non;
            const wsr_ren_bad_subtotal = ren_self_bad + ren_wsr_bad + ren_etc_bad;

            let ren_non_part = 0, ren_bad_part = 0, renew_perf_join = 0;
            let pay_new = 0, pay_renew = 0, rate_new = 0, rate_renew = 0, renew_convert_rate = 0.80, renew_final_perf = 0;
            let sum_new_renew_pay = 0;
            let wsr_total_base = 0, wsr_total_rate = 0;
            let career_perf = 0;

            if (agent.attribute === 'OSR혼합') {
                ren_non_part = ren_self_non + (ren_wsr_non + ren_etc_non) * 0.5;
                ren_bad_part = ren_self_bad + (ren_wsr_bad + ren_etc_bad) * 0.5;

                // OSR혼합이면서 전환자 여부가 'Y'인 경우 갱신실적 합산 공식을 변경합니다.
                if (agent.isTransfer === 'Y') {
                    renew_perf_join = (ren_self_non + ren_wsr_non + ren_etc_non) + (ren_self_bad + ren_wsr_bad + ren_etc_bad) * 0.5;
                } else {
                    renew_perf_join = ren_non_part + (ren_bad_part * 0.5);
                }

                if(agent.isTransfer === 'Y') {
                    renew_convert_rate = 1.00;
                } else {
                    if (rules['OSR혼합'] && rules['OSR혼합'].renew_convert) {
                        let sortedConvert = [...rules['OSR혼합'].renew_convert].sort((a,b) => a.t - b.t);
                        sortedConvert.forEach(r => { if (new_subtotal >= r.t) renew_convert_rate = r.r; });
                    }
                }
                renew_final_perf = renew_perf_join * renew_convert_rate;

                if (rules['OSR혼합']) {
                    let sortedNew = [...rules['OSR혼합'].perf_new].sort((a,b) => a.t - b.t);
                    sortedNew.forEach(r => { if(new_subtotal >= r.t) rate_new = r.r / 100; });
                    
                    let sortedRenew = [...rules['OSR혼합'].perf_renew].sort((a,b) => a.t - b.t);
                    sortedRenew.forEach(r => { if(renew_final_perf >= r.t) rate_renew = r.r / 100; });
                }
                pay_new = Math.round(new_subtotal * rate_new);
                pay_renew = Math.round(renew_final_perf * rate_renew);
                sum_new_renew_pay = pay_new + pay_renew;
                career_perf = new_subtotal + renew_final_perf;

            } else if(agent.attribute === 'WSR') {
                renew_perf_join = (wsr_ren_non_subtotal * 0.5) + (wsr_ren_bad_subtotal * 0.25);
                wsr_total_base = new_subtotal + renew_perf_join; 
                
                if (rules['WSR'] && rules['WSR'].total_perf) {
                    let sortedWsr = [...rules['WSR'].total_perf].sort((a,b) => a.t - b.t);
                    sortedWsr.forEach(r => { if(wsr_total_base >= r.t) wsr_total_rate = r.r / 100; });
                }
                sum_new_renew_pay = Math.round(wsr_total_base * wsr_total_rate); 
                career_perf = wsr_total_base;
            }

            let dateStr = "";
            let diffDays = 0;
            let career_group = 0; 
            let displayYearLabel = "1년미만";

            if(agent.entryDate) {
                let curMonthStr = getSelectedMonth() || "2026-06"; 
                let parts = curMonthStr.split('-');
                let payYear = parseInt(parts[0]);
                let payMonth = parseInt(parts[1]); 
                
                // 지급년월 전월 마지막 날짜 (예: 2026년 6월 급여이면 5월 31일)
                let prevMonthLastDate = new Date(payYear, payMonth - 1, 0); 
                prevMonthLastDate.setHours(0, 0, 0, 0);
                
                // 입사일을 타임존 오차 없이 로컬 타임으로 안전하게 생성
                let dateParts = agent.entryDate.split('-');
                let entryDate = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
                entryDate.setHours(0, 0, 0, 0);
                
                let diffTime = prevMonthLastDate.getTime() - entryDate.getTime();
                if (diffTime >= 0) {
                    diffDays = Math.round(diffTime / (1000 * 60 * 60 * 24)) + 1; 
                    let calcYears = diffDays / 365;

                    if (calcYears >= 5) { career_group = 5; displayYearLabel = "5년 이상"; }
                    else if (calcYears >= 3) { career_group = 3; displayYearLabel = "3년 이상"; }
                    else if (calcYears >= 2) { career_group = 2; displayYearLabel = "2년 이상"; }
                    else if (calcYears >= 1) { career_group = 1; displayYearLabel = "1년 이상"; }
                    else { career_group = 0; displayYearLabel = "1년 미만"; }
                    dateStr = `${displayYearLabel}(${diffDays.toLocaleString('ko-KR')}일)`;
                } else {
                    dateStr = "1년 미만(1일)";
                    career_group = 0;
                }
            } else {
                dateStr = "미설정";
                career_group = 0;
            }
            
            let career_pay = 0;
            let attrRules = rules[agent.attribute];
            if(attrRules && attrRules.career && attrRules.career.length > 0) {
                let targetRow = null;
                let sortedCareer = [...attrRules.career].sort((a,b) => a.t - b.t);
                sortedCareer.forEach(r => { if(career_perf >= r.t) targetRow = r; });
                
                if(targetRow && career_group > 0) {
                    if(career_group === 5) career_pay = targetRow.y5 || 0;
                    else if(career_group === 3) career_pay = targetRow.y3 || 0;
                    else if(career_group === 2) career_pay = targetRow.y2 || 0;
                    else if(career_group === 1) career_pay = targetRow.y1 || 0;
                }
            }

            let joint_perf_total = 0;
            inputSchema.forEach(s => { if(s.type === '갱신' && !s.isCalc && g[s.key]) joint_perf_total += getRawNum(g[s.key].joint); });
            
            const joint_pay_rate = d.jointRate / 100;
            const pay_joint = Math.round(joint_perf_total * joint_pay_rate);

            let closing_activity_rate = 0; 
            const agent_closing_rate = d.closingRate || 0;
            if(rules['WSR'] && rules['WSR'].closing_rate_rule) {
                let sortedClosing = [...rules['WSR'].closing_rate_rule].sort((a,b) => a.t - b.t);
                sortedClosing.forEach(r => { if(agent_closing_rate >= r.t) closing_activity_rate = r.r / 100; });
            }
            let closing_activity_pay = Math.round(sum_new_renew_pay * closing_activity_rate);
            let final_closing_pay = (agent.attribute === 'WSR') ? closing_activity_pay : 0;

            const total = getRawNum(d.basePay) + getRawNum(d.dutyPay) + getRawNum(d.leaderPay) + getRawNum(d.protectionPay) + 
                          sum_new_renew_pay + career_pay + pay_joint + final_closing_pay + getRawNum(d.deduction);

            return {
                n_non, n_p50, n_avg, n_bad, new_subtotal, rate_new, pay_new,
                ren_self_non, ren_wsr_non, ren_etc_non, ren_self_bad, ren_wsr_bad, ren_etc_bad,
                wsr_ren_non_subtotal, wsr_ren_bad_subtotal,
                renew_perf_join, renew_convert_rate, renew_final_perf, rate_renew, pay_renew,
                wsr_total_base, wsr_total_rate,
                sum_new_renew_pay, 
                career_perf, dateStr, career_pay, career_group,
                joint_perf_total, joint_pay_rate, pay_joint,
                closing_activity_rate, closing_activity_pay: final_closing_pay, total
            };
        }

        // [복구 완료] '예상vs실제' 상세 정보 명세 테이블 렌더러 함수

            const mode = currentSheetDataType === 'est_sheet' ? 'estimated' : 'actual';

                    <tr><td rowspan="4" class="st-label-main text-red-500">갱신(불량 실적)</td><td class="st-label-leaf text-red-500">본인갱신</td><td class="st-value text-red-400">${fnFormat(res.ren_self_bad)}</td></tr>
                    <tr><td class="st-label-leaf text-red-500">WSR갱신</td><td class="st-value text-red-400">${fnFormat(res.ren_wsr_bad)}</td></tr>
                    <tr><td class="st-label-leaf text-red-500">기타갱신</td><td class="st-value text-red-400">${fnFormat(res.ren_etc_bad)}</td></tr>
                    <tr class="text-right bg-red-50/20 font-bold"><td class="st-label-leaf text-red-600">불량 실적 소계</td><td class="st-value text-red-500">${fnFormat(res.wsr_ren_bad_subtotal)}</td></tr>
                    
                    <tr class="bg-emerald-50/40"><td class="st-label-main text-emerald-800">갱신(전체)</td><td class="st-label-leaf font-bold">갱신실적합산</td><td class="st-value-total">${fnFormat(res.renew_perf_join)}</td></tr>
                    
                    <tr class="bg-teal-50"><td rowspan="3" class="st-label-main text-teal-800 font-extrabold">성과급 합산</td><td class="st-label-leaf text-teal-700">전체 실적합산</td><td class="st-value font-bold">${fnFormat(res.wsr_total_base)}</td></tr>
                    <tr class="bg-teal-50"><td class="st-label-leaf text-teal-700">지급율 (%)</td><td class="st-value font-bold text-teal-700">${fnPct2(res.wsr_total_rate * 100)}</td></tr>
                    <tr class="bg-teal-100/60"><td class="st-label-leaf font-black text-teal-900">성과수당 총 합계액</td><td class="st-value-mix text-right font-black">${fnFormat(res.sum_new_renew_pay)}</td></tr>
                `;
            } else {
                html += `
                    <tr><td rowspan="6" class="st-label-main">신규</td><td class="st-label-leaf">비불량 실적</td><td class="st-value">${fnFormat(res.n_non)}</td></tr>
                    <tr><td class="st-label-leaf">50% 실적</td><td class="st-value">${fnFormat(res.n_p50)}</td></tr>

                    <tr><td class="st-label-leaf">WSR갱신</td><td class="st-value">${fnFormat(res.ren_wsr_non)}</td></tr>
                    <tr><td class="st-label-leaf">기타갱신</td><td class="st-value">${fnFormat(res.ren_etc_non)}</td></tr>

                    <tr><td class="st-label-leaf text-red-500">WSR갱신</td><td class="st-value text-red-400">${fnFormat(res.ren_wsr_bad)}</td></tr>
                    <tr><td class="st-label-leaf text-red-500">기타갱신</td><td class="st-value text-red-400">${fnFormat(res.ren_etc_bad)}</td></tr>
                    <tr class="text-right bg-red-50/20 font-bold"><td class="st-label-leaf text-red-600">소계</td><td class="st-value text-red-500">${fnFormat(res.ren_self_bad + res.ren_wsr_bad + res.ren_etc_bad)}</td></tr>

                    <tr class="bg-blue-50/30"><td class="st-label-leaf font-bold text-blue-800">③ 체결 활동수당 금액</td><td class="st-value-total text-blue-800">${fnFormat(res.closing_activity_pay)}</td></tr>

            html += `
                    <tr><td colspan="3" class="st-section"></td></tr>
                    <tr class="bg-red-50/20"><td class="st-label-main text-red-600 font-bold">공제 항목</td><td class="st-label-leaf text-red-600">불완전판매 공제</td><td class="st-value-minus">${fnFormat(getRawNum(agent[mode].deduction))}</td></tr>
                </tbody>
            </table>`;
            
            document.getElementById('sheet-container').innerHTML = html;
        }

        function saveAgentData() {
            let list = getAgentsOfSelectedMonth();
            const editId = document.getElementById('edit-agent-id').value;
            const attr = document.getElementById('m-attr').value;
            
            const agentData = {
                name: document.getElementById('m-name').value,
                attribute: attr,
                isTransfer: (attr === 'OSR혼합') ? document.getElementById('m-transfer').value : 'N',
                entryDate: document.getElementById('m-date').value,
                center: document.getElementById('m-center').value,
                room: document.getElementById('m-room').value
            };

            let targetObj = null;
            if(editId) {
                targetObj = list.find(x => x.id == editId);
                if(targetObj) Object.assign(targetObj, agentData);
                currentInputAgentId = editId;
                currentExpectedAgentId = editId;
            } else {
                const newId = Date.now();
                targetObj = {
                    id: newId, ...agentData,
                    estimated: { basePay: 1320000, dutyPay: 80000, leaderPay: 0, protectionPay: 0, grid: {}, closingRate: 0, renewRate: 0, jointRate: 0.5, deduction: 0 },
                    actual: { basePay: 1320000, dutyPay: 80000, leaderPay: 0, protectionPay: 0, grid: {}, closingRate: 0, renewRate: 0, jointRate: 0.5, deduction: 0 }
                };
                list.push(targetObj);
                currentInputAgentId = newId;
                currentExpectedAgentId = newId;
            }
            
            propagateToNextMonth(targetObj);
            initializeGridDataStructures(); 
            
            // 신규 추가 및 정보 수정 시 로컬 영구 백업 연동
            saveToLocalStorage();
            
            closeAgentModal(); 
            renderAll();
        }
    </script>
